<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Customer Support Chatbot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        #chat-box {
            border: 1px solid #ddd;
            height: 500px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
        }

        .user {
            margin: 10px 0;
            text-align: right;
        }

        .bot {
            margin: 10px 0;
        }

        .message {
            display: inline-block;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user .message {
            background: #dbeafe;
        }

        .bot .message {
            background: #f3f4f6;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>AI Customer Support Chatbot</h1>

    <div id="chat-box"></div>

    <div class="input-area">
        <input
            type="text"
            id="message"
            placeholder="Ask something..."
        >
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>

        async function sendMessage() {

            const input = document.getElementById("message");
            const chatBox = document.getElementById("chat-box");

            const message = input.value.trim();

            if (!message) return;

            chatBox.innerHTML += `
                <div class="user">
                    <div class="message">${message}</div>
                </div>
            `;

            input.value = "";

            try {

                const response = await fetch(
                    "http://127.0.0.1:8000/chat",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: message
                        })
                    }
                );

                const data = await response.json();

                chatBox.innerHTML += `
                    <div class="bot">
                        <div class="message">${data.reply}</div>
                    </div>
                `;

                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {

                chatBox.innerHTML += `
                    <div class="bot">
                        <div class="message">
                            Error connecting to server.
                        </div>
                    </div>
                `;
            }
        }

        document
            .getElementById("message")
            .addEventListener("keypress", function(e) {

                if (e.key === "Enter") {
                    sendMessage();
                }
            });

    </script>

</body>
</html>
